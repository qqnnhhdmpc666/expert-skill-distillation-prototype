rule_id: R006
title: "审计日志保留"
risk: "medium"
source_snippet: "上传、下载、删除等高风险文件操作必须写入审计日志，并定义保留策略。"
action: "检查关键安全事件是否有审计日志和保留策略。"
evidence_terms:
  - "audit_log_retention_days"
  - "audit"
  - "security_event"
required_output_fields:
  - finding_id
  - rule_id
  - evidence_span
  - risk_level
  - recommended_fix
acceptance:
  - evidence_span must quote target_asset text
  - recommended_fix must be actionable
repair_operator: patch_rule
