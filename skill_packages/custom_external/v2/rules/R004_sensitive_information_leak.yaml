rule_id: R004
title: "敏感信息泄露"
risk: "medium"
source_snippet: "错误响应不能泄露内部路径、邮箱、token、api_key 或 stacktrace。"
action: "检查错误响应和日志是否暴露邮箱、token、密钥或内部错误。"
evidence_terms:
  - "alice@example.com"
  - "SQL syntax error"
  - "api_key"
  - "stacktrace"
  - "debug_path"
required_output_fields:
  - finding_id
  - rule_id
  - evidence_span
  - risk_level
  - recommended_fix
acceptance:
  - evidence_span must quote target_asset text
  - recommended_fix must be actionable
repair_operator: patch_rule
