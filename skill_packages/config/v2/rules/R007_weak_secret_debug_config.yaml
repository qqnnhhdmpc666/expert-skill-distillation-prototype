rule_id: R007
title: "弱密钥与调试配置"
risk: "high"
source_snippet: "生产配置不得开启 debug，不能使用默认 secret 或开放 CORS。"
action: "检查 debug=true、默认密钥、弱 JWT secret 和过宽 CORS。"
evidence_terms:
  - "debug: true"
  - "SECRET_KEY"
  - "cors: '*'"
  - "jwt_secret"
required_output_fields:
  - finding_id
  - rule_id
  - evidence_span
  - risk_level
  - recommended_fix
acceptance:
  - evidence_span must quote target_asset text
  - recommended_fix must be actionable
repair_operator: patch_rule
