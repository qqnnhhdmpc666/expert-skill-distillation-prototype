rule_id: R005
title: "文件上传安全"
risk: "high"
source_snippet: "上传接口不能只依赖扩展名；必须交叉校验 MIME 类型、内容魔数和隔离存储路径。"
action: "检查上传是否同时校验扩展名、MIME、内容魔数和隔离存储路径。"
evidence_terms:
  - "upload"
  - "content_type"
  - "endswith"
  - "uploads/"
required_output_fields:
  - finding_id
  - rule_id
  - evidence_span
  - risk_level
  - recommended_fix
acceptance:
  - evidence_span must quote target_asset text
  - recommended_fix must be actionable
repair_operator: patch_rule
